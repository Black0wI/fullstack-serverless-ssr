<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Next.js SST Boilerplate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .offline { max-width: 480px; }
    .offline__icon { font-size: 4rem; margin-bottom: 1.5rem; }
    .offline__title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    .offline__text { color: #a0a0b4; line-height: 1.6; margin-bottom: 2rem; }
    .offline__btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="offline">
    <div class="offline__icon">📡</div>
    <h1 class="offline__title">You are offline</h1>
    <p class="offline__text">
      This page is not available without a network connection.
      Check your internet access and try again.
    </p>
    <button class="offline__btn" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
