version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-tools:
        patterns:
          - "eslint*"
          - "prettier"
          - "typescript"
          - "@types/node"
      testing:
        patterns:
          - "@playwright/*"
          - "@lhci/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "automated"

  # Terraform providers
  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "monthly"
    labels:
      - "infrastructure"
      - "automated"
