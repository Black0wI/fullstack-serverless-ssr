name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static export for GitHub Pages
        run: |
          # Temporarily switch next.config to static export mode
          cp next.config.ts next.config.ts.bak
          cat > next.config.ts << 'NEXTCONFIG'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {
            output: "export",
            basePath: "/nextjs-static-edge-template",
            images: { unoptimized: true },
            trailingSlash: true,
          };

          export default nextConfig;
          NEXTCONFIG
          npx next build
        env:
          NEXT_PUBLIC_SITE_URL: https://black0wi.github.io/nextjs-static-edge-template

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
