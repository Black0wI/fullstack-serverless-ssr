name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static export for GitHub Pages
        run: |
          # Remove files incompatible with static export
          rm -f src/middleware.ts
          rm -rf src/app/api/

          # Replace next.config with static export version
          cat > next.config.ts << 'NEXTCONFIG'
          import type { NextConfig } from "next";
          import withBundleAnalyzer from "@next/bundle-analyzer";

          const nextConfig: NextConfig = {
            output: "export",
            basePath: "/nextjs-static-edge-template",
            images: { unoptimized: true },
            trailingSlash: true,
          };

          const analyzer = withBundleAnalyzer({
            enabled: process.env.ANALYZE === "true",
          });

          export default analyzer(nextConfig);
          NEXTCONFIG

          npx next build

          test -f out/index.html && echo "✅ Static export successful" || exit 1
          echo "📦 Output size: $(du -sh out/ | cut -f1)"
        env:
          NEXT_PUBLIC_SITE_URL: https://black0wi.github.io/nextjs-static-edge-template

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
