# ============================================
# DEPLOY — SST v3 deployment to production
# Triggered on push to main branch
# ============================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-3

      - name: Deploy with SST
        run: npx sst deploy --stage production

      # ── Cloudflare DNS (conditionnel) ──
      - name: Update Cloudflare CNAME
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_RECORD_NAME: ${{ vars.CLOUDFLARE_RECORD_NAME }}
        run: |
          # Get the CloudFront domain from SST outputs
          DISTRIBUTION_DOMAIN=$(npx sst output --stage production url 2>/dev/null | sed 's|https://||;s|/||g' || echo "")

          if [ -z "$DISTRIBUTION_DOMAIN" ]; then
            echo "⚠️ Could not get SST output URL, skipping DNS update"
            exit 0
          fi

          # Check if record exists
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${CF_RECORD_NAME}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          RECORD_ID=$(echo $EXISTING | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ]; then
            # Update existing record
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"CNAME\",\"name\":\"${CF_RECORD_NAME}\",\"content\":\"${DISTRIBUTION_DOMAIN}\",\"proxied\":true}"
            echo "✅ Updated CNAME: ${CF_RECORD_NAME} → ${DISTRIBUTION_DOMAIN}"
          else
            # Create new record
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"CNAME\",\"name\":\"${CF_RECORD_NAME}\",\"content\":\"${DISTRIBUTION_DOMAIN}\",\"proxied\":true}"
            echo "✅ Created CNAME: ${CF_RECORD_NAME} → ${DISTRIBUTION_DOMAIN}"
          fi
