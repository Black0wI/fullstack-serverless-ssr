# ============================================
# AUTO PR — Create PR from ai-agent → main
# Triggered on push to ai-agent branch
# ============================================

name: Auto PR

on:
  push:
    branches: [ai-agent]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Create or Update PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          CHANGED=$(git diff --name-only origin/main...HEAD | head -20)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = "ai-agent";
            const base = "main";

            // Check for existing open PR
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, head: `${owner}:${head}`, base, state: "open"
            });

            const body = `## 🤖 AI Agent Changes

            **Last commit:** \`${{ steps.commit.outputs.sha_short }}\` — ${{ steps.commit.outputs.message }}
            **Author:** ${{ steps.commit.outputs.author }}

            ### Files changed
            \`\`\`
            ${{ steps.commit.outputs.files }}
            \`\`\`

            ---

            > ⚠️ **Human review required before merge.**
            > This PR was auto-created from the \`ai-agent\` branch.
            > Please review all changes carefully before merging to \`main\` (production).`;

            if (prs.length > 0) {
              // Update existing PR
              const pr = prs[0];
              await github.rest.pulls.update({
                owner, repo,
                pull_number: pr.number,
                body: body,
              });
              console.log(`✅ Updated PR #${pr.number}`);

              // Add comment for new push
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: pr.number,
                body: `🔄 New push: \`${{ steps.commit.outputs.sha_short }}\` — ${{ steps.commit.outputs.message }}`
              });
            } else {
              // Create new PR
              const { data: pr } = await github.rest.pulls.create({
                owner, repo,
                title: `🤖 AI Agent → Production`,
                head, base, body,
                draft: false,
              });
              console.log(`✅ Created PR #${pr.number}`);

              // Add labels
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: pr.number,
                labels: ["ai-generated", "needs-review"]
              });
            }
