# ============================================
# RELEASE — Auto-create GitHub Release on tag
# Generates changelog from conventional commits
# ============================================

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          
          if [ -z "$PREV_TAG" ]; then
            # First release — all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
          fi

          # Group by conventional commit type
          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
          INFRA=$(echo "$COMMITS" | grep -i "^- infra" || true)
          DOCS=$(echo "$COMMITS" | grep -i "^- docs" || true)
          OTHER=$(echo "$COMMITS" | grep -iv "^- feat\|^- fix\|^- infra\|^- docs" || true)

          BODY=""
          [ -n "$FEATURES" ] && BODY="${BODY}## ✨ Features\n${FEATURES}\n\n"
          [ -n "$FIXES" ] && BODY="${BODY}## 🐛 Bug Fixes\n${FIXES}\n\n"
          [ -n "$INFRA" ] && BODY="${BODY}## 🏗️ Infrastructure\n${INFRA}\n\n"
          [ -n "$DOCS" ] && BODY="${BODY}## 📚 Documentation\n${DOCS}\n\n"
          [ -n "$OTHER" ] && BODY="${BODY}## 🔧 Other\n${OTHER}\n\n"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const isPrerelease = tag.includes('-');
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `${{ steps.changelog.outputs.body }}`,
              draft: false,
              prerelease: isPrerelease,
              generate_release_notes: true,
            });
